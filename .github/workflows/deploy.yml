name: Build & Deploy to Zeabur

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (WASM)
        run: flutter build web --wasm --release --pwa-strategy offline-first --tree-shake-icons

      - name: Deploy to Zeabur
        uses: zeabur/action@main
        with:
          project_id: ${{ secrets.ZEABUR_PROJECT_ID }}
          service_id: ${{ secrets.ZEABUR_SERVICE_ID }}
          working_directory: build/web
        env:
          ZEABUR_TOKEN: ${{ secrets.ZEABUR_TOKEN }}
