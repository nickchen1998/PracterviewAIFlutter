server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback - all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve pre-compressed Brotli files
    location ~* \.(js|css|wasm|html|json|svg)$ {
        brotli_static on;
        gzip_static on;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache other static assets
    location ~* \.(png|jpg|jpeg|gif|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html or flutter_bootstrap.js
    location = /index.html {
        brotli_static on;
        gzip_static on;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /flutter_bootstrap.js {
        brotli_static on;
        gzip_static on;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Fallback dynamic compression (for non-precompressed files)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/wasm;
    gzip_min_length 256;
}
